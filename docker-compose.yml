version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civic-issues-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - civic-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0-alpine
    container_name: civic-issues-mongo
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    networks:
      - civic-network
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_config:

networks:
  civic-network:
    driver: bridge
